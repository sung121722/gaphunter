name: Daily Scan

on:
  workflow_dispatch:        # manual trigger only (disabled auto schedule)

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY:            ${{ secrets.SERPAPI_KEY }}
          GOOGLE_CSE_KEY:         ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID:          ${{ secrets.GOOGLE_CSE_ID }}
          COLAB_PREDICTOR_URL:    ${{ secrets.COLAB_PREDICTOR_URL }}
          DRY_RUN_MODE:           "false"
          MAX_KEYWORDS_PER_RUN:   "3"
          MAX_SERPAPI_CALLS_PER_DAY: "10"
        run: |
          python main.py --niche "${{ vars.NICHE }}" --geo "${{ vars.GEO || 'US' }}"

      - name: Commit wiki updates
        run: |
          git config user.name  "GapHunter Bot"
          git config user.email "bot@gaphunter.io"
          git add wiki/
          git diff --staged --quiet || git commit -m "chore: daily scan $(date -u +%Y-%m-%d)"
          git push
