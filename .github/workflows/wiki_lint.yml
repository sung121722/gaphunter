name: Wiki Lint

on:
  schedule:
    - cron: "0 0 * * 1"    # Every Monday 09:00 KST
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wiki lint
        env:
          DRY_RUN_MODE: "true"
        run: python main.py --wiki-lint
