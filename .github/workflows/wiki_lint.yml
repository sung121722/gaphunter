name: Wiki Lint

on:
  workflow_dispatch:        # manual trigger only (disabled auto schedule)

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wiki lint
        env:
          DRY_RUN_MODE: "true"
        run: python main.py --wiki-lint
