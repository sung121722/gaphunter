name: GapHunter Daily

on:
  schedule:
    - cron: '17 1 * * *'  # 매일 01:17 UTC = 10:17 KST (피크 시간 회피)
  workflow_dispatch:        # 수동 실행 버튼

jobs:

  # ── EN: Blogger 완전 자동 발행 ─────────────────────────────────────────────
  publish-en:
    name: EN Blogger 자동 발행
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EN pipeline
        id: run
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY:           ${{ secrets.SERPAPI_KEY }}
          GOOGLE_CSE_KEY:        ${{ secrets.GOOGLE_CSE_KEY }}
          AMAZON_ASSOCIATES_ID:  ${{ secrets.AMAZON_ASSOCIATES_ID }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          COLAB_PREDICTOR_URL:   ${{ secrets.COLAB_PREDICTOR_URL }}
          DRY_RUN_MODE:          "false"
        run: python scripts/run_en.py

      - name: Commit posts & wiki
        run: |
          git config user.name  "GapHunter Bot"
          git config user.email "bot@gaphunter.com"
          git add posts/ wiki/
          git diff --staged --quiet || git commit -m "feat(en): daily post - $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push


  # ── KO: 포스트 생성 + 티스토리 비공개 저장 ───────────────────────────────
  generate-ko:
    name: KO 포스트 생성 + 티스토리 비공개 저장
    runs-on: ubuntu-latest
    needs: publish-en
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate KO post + 티스토리 비공개 저장
        id: generate
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY:          ${{ secrets.SERPAPI_KEY }}
          GOOGLE_CSE_KEY:       ${{ secrets.GOOGLE_CSE_KEY }}
          COUPANG_PARTNERS_ID:  ${{ secrets.COUPANG_PARTNERS_ID }}
          COLAB_PREDICTOR_URL:  ${{ secrets.COLAB_PREDICTOR_URL }}
          TISTORY_ACCESS_TOKEN: ${{ secrets.TISTORY_ACCESS_TOKEN }}
          TISTORY_BLOG_NAME:    ${{ secrets.TISTORY_BLOG_NAME }}
          DRY_RUN_MODE:         "false"
        run: python scripts/run_ko.py

      - name: Commit posts & wiki
        if: always()
        run: |
          git config user.name  "GapHunter Bot"
          git config user.email "bot@gaphunter.com"
          git add posts/ wiki/
          git diff --staged --quiet || git commit -m "feat(ko): daily post draft - $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
